<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealPolitik Core - Cliente de Prueba</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #f4f4f9; color: #333; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 0.5rem; }
        .panel { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        .status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 4px; font-weight: bold; font-size: 0.9rem; }
        .status.connected { background: #d4edda; color: #155724; }
        .status.disconnected { background: #f8d7da; color: #721c24; }
        textarea { width: 100%; height: 120px; font-family: monospace; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; resize: vertical; }
        button { background: #3498db; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 4px; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
        button:hover { background: #2980b9; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #log { background: #2c3e50; color: #ecf0f1; padding: 1rem; border-radius: 4px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; }
        .log-entry { margin-bottom: 0.5rem; border-bottom: 1px solid #34495e; padding-bottom: 0.25rem; }
        .log-entry.error { color: #e74c3c; }
        .log-entry.success { color: #2ecc71; }
        .log-entry.info { color: #3498db; }
        .controls { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        input[type="text"], input[type="number"] { padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>🌍 RealPolitik Core - Cliente de Prueba</h1>

    <!-- Panel de Conexión -->
    <div class="panel">
        <h2>1. Conexión</h2>
        <div style="margin-bottom: 1rem;">
            Estado: <span id="connectionStatus" class="status disconnected">Desconectado</span>
        </div>
        <div class="controls">
            <input type="text" id="playerId" placeholder="ID Jugador (ej. P1)" value="P1">
            <input type="text" id="nationId" placeholder="ID Nación (ej. A)" value="A">
            <button id="btnConnect" onclick="connect()">Conectar</button>
            <button id="btnDisconnect" onclick="disconnect()" disabled>Desconectar</button>
        </div>
    </div>

    <!-- Panel de Envío de Intenciones -->
    <div class="panel">
        <h2>2. Enviar Intención (Validación de Esquema)</h2>
        <p style="font-size: 0.9rem; color: #666;">Edita el JSON abajo. Si el esquema es inválido, el servidor rechazará el mensaje con un error detallado.</p>
        <textarea id="intentJson">{
  "type": "build_unit",
  "payload": {
    "unitType": "infantry",
    "location": "capital"
  }
}</textarea>
        <div class="controls">
            <button id="btnSend" onclick="sendIntent()" disabled>Enviar Intención</button>
            <button onclick="fillValidIntent()">Ejemplo Válido</button>
            <button onclick="fillInvalidIntent()">Ejemplo Inválido (Test)</button>
        </div>
    </div>

    <!-- Panel de Logs -->
    <div class="panel">
        <h2>3. Registro de Eventos</h2>
        <div id="log"></div>
        <button onclick="clearLog()" style="margin-top: 0.5rem; background: #7f8c8d;">Limpiar Log</button>
    </div>

    <script>
        let ws = null;
        const statusEl = document.getElementById('connectionStatus');
        const logEl = document.getElementById('log');
        const btnConnect = document.getElementById('btnConnect');
        const btnDisconnect = document.getElementById('btnDisconnect');
        const btnSend = document.getElementById('btnSend');

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function clearLog() {
            logEl.innerHTML = '';
            log('Log limpiado.', 'info');
        }

        function updateUI(connected) {
            if (connected) {
                statusEl.textContent = 'Conectado';
                statusEl.className = 'status connected';
                btnConnect.disabled = true;
                btnDisconnect.disabled = false;
                btnSend.disabled = false;
            } else {
                statusEl.textContent = 'Desconectado';
                statusEl.className = 'status disconnected';
                btnConnect.disabled = false;
                btnDisconnect.disabled = true;
                btnSend.disabled = true;
            }
        }

        function connect() {
            const playerId = document.getElementById('playerId').value.trim();
            const nationId = document.getElementById('nationId').value.trim();

            if (!playerId || !nationId) {
                log('Error: Debes ingresar ID de jugador y nación.', 'error');
                return;
            }

            const url = `ws://${window.location.hostname}:8080`;
            log(`Intentando conectar a ${url}...`, 'info');

            try {
                ws = new WebSocket(url);

                ws.onopen = () => {
                    log('Conexión WebSocket establecida.', 'success');
                    
                    // Enviar Handshake
                    const handshake = {
                        type: 'handshake',
                        playerId: playerId,
                        nationId: nationId
                    };
                    ws.send(JSON.stringify(handshake));
                    log(`Handshake enviado: Jugador ${playerId}, Nación ${nationId}`, 'info');
                    
                    updateUI(true);
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        log(`Mensaje recibido: ${JSON.stringify(data, null, 2)}`, data.type === 'error' ? 'error' : 'success');
                        
                        if (data.type === 'error') {
                            // Manejo específico de errores de validación
                            if (data.details) {
                                log(`Detalles del error: ${JSON.stringify(data.details)}`, 'error');
                            }
                        }
                    } catch (e) {
                        log(`Mensaje crudo recibido: ${event.data}`, 'info');
                    }
                };

                ws.onclose = () => {
                    log('Conexión cerrada por el servidor o red.', 'error');
                    updateUI(false);
                    ws = null;
                };

                ws.onerror = (error) => {
                    log(`Error en WebSocket: ${error.message || 'Desconocido'}`, 'error');
                };

            } catch (e) {
                log(`Fallo al crear WebSocket: ${e.message}`, 'error');
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                log('Solicitando desconexión...', 'info');
            }
        }

        function sendIntent() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('Error: No estás conectado.', 'error');
                return;
            }

            const rawJson = document.getElementById('intentJson').value;
            let intentData;

            try {
                intentData = JSON.parse(rawJson);
            } catch (e) {
                log(`Error de sintaxis JSON: ${e.message}`, 'error');
                return;
            }

            // Envolver en el formato de mensaje esperado por el servidor
            const message = {
                type: 'intent',
                payload: intentData
            };

            log(`Enviando intención: ${JSON.stringify(message, null, 2)}`, 'info');
            ws.send(JSON.stringify(message));
        }

        function fillValidIntent() {
            const valid = {
                "type": "build_unit",
                "payload": {
                    "unitType": "scout",
                    "location": "border_north"
                }
            };
            document.getElementById('intentJson').value = JSON.stringify(valid, null, 2);
            log('Plantilla válida cargada.', 'info');
        }

        function fillInvalidIntent() {
            // Falta el campo obligatorio "type" o tiene un valor incorrecto
            const invalid = {
                "typo": "build_unit", // Error intencional: debería ser "type"
                "payload": {
                    "foo": "bar"
                }
                // Falta timestamp y playerId (se inyectan, pero el schema valida estructura base)
            };
            document.getElementById('intentJson').value = JSON.stringify(invalid, null, 2);
            log('Plantilla INVÁLIDA cargada (prueba de validación).', 'error');
        }

        // Inicialización
        updateUI(false);
        log('Cliente listo. Ingresa tus datos y pulsa "Conectar".', 'info');
    </script>
</body>
</html>
